name: Module Maintenance

on:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Update dependencies
        shell: pwsh
        run: |
          go get -u ./...
          go mod tidy

      - name: Check for changes
        id: check
        shell: pwsh
        run: |
          $diff = git diff --name-only
          if ($diff) {
            echo "changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            echo "changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Create PR
        if: steps.check.outputs.changes == 'true'
        shell: pwsh
        run: |
          $branch = "chore/weekly-deps-$(Get-Date -Format 'yyyy-MM-dd')"
          git checkout -b $branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): weekly go module update"
          git push origin $branch --force
          
          $prPayload = @{
            title = "chore(deps): weekly go module update"
            head = $branch
            base = "main"
            body = "Automated weekly Go module dependency update via ``go get -u ./...`` followed by ``go mod tidy``."
          } | ConvertTo-Json
          
          $response = Invoke-WebRequest `
            -Method POST `
            -Uri "https://api.github.com/repos/coff33ninja/ai-memory/pulls" `
            -Headers @{
              "Authorization" = "token $env:GH_TOKEN"
              "Accept" = "application/vnd.github+json"
              "User-Agent" = "GitHub-Actions"
            } `
            -Body $prPayload `
            -ContentType "application/json"
          
          if ($response.StatusCode -eq 201) {
            Write-Host "Pull request created successfully"
          } else {
            Write-Host "Failed to create pull request: $($response.StatusCode)"
            exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
